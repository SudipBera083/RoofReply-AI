version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: roofreply_db
    environment:
      POSTGRES_DB: roofreply_db
      POSTGRES_USER: roofreply_user
      POSTGRES_PASSWORD: roofreply_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roofreply_user -d roofreply_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: roofreply_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roofreply_backend
    command: /app/entrypoint.sh
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=roofreply_db
      - DB_USER=roofreply_user
      - DB_PASSWORD=roofreply_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_DEBUG=True
      - ALLOWED_HOSTS=*
      - DJANGO_SECRET_KEY=django-insecure-roofreply-dev-key-123456
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
